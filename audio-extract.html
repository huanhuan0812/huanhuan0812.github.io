<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FFmpeg 视频音频提取器 - 在线工具</title>
  <style>
    /* ========== CSS 变量 - 主题系统 ========== */
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-card: rgba(255, 255, 255, 0.05);
      --bg-card-hover: rgba(255, 255, 255, 0.08);
      --bg-input: rgba(0, 0, 0, 0.4);
      --bg-upload: rgba(255, 255, 255, 0.03);
      --bg-progress: rgba(255, 255, 255, 0.05);
      
      --text-primary: #ffffff;
      --text-secondary: #e0e0e0;
      --text-tertiary: #a0a0b0;
      --text-muted: #606070;
      
      --border-color: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.15);
      --border-upload: rgba(255, 255, 255, 0.15);
      
      --accent-start: #667eea;
      --accent-end: #764ba2;
      --accent-shadow: rgba(102, 126, 234, 0.3);
      --accent-hover-shadow: rgba(118, 75, 162, 0.4);
      
      --error-bg: rgba(255, 107, 107, 0.1);
      --error-text: #ff6b6b;
      --success-bg: rgba(76, 175, 80, 0.1);
      --success-text: #4caf50;
      
      --card-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      --backdrop-blur: blur(30px);
    }
    
    [data-theme="light"] {
      --bg-primary: #f5f5f5;
      --bg-secondary: #e8e8e8;
      --bg-card: rgba(255, 255, 255, 0.9);
      --bg-card-hover: rgba(255, 255, 255, 0.95);
      --bg-input: rgba(0, 0, 0, 0.05);
      --bg-upload: rgba(0, 0, 0, 0.02);
      --bg-progress: rgba(0, 0, 0, 0.05);
      
      --text-primary: #1a1a2e;
      --text-secondary: #2a2a3e;
      --text-tertiary: #5a5a6e;
      --text-muted: #8a8a9e;
      
      --border-color: rgba(0, 0, 0, 0.1);
      --border-hover: rgba(0, 0, 0, 0.15);
      --border-upload: rgba(0, 0, 0, 0.12);
      
      --card-shadow: 0 25px 50px rgba(0, 0, 0, 0.1);
      --backdrop-blur: blur(20px);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 1rem;
      margin: 0;
      transition: background 0.3s ease;
    }
    
    .container {
      background: var(--bg-card);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      box-shadow: var(--card-shadow);
      padding: 2rem;
      max-width: 650px;
      width: 100%;
      color: var(--text-secondary);
      transition: all 0.3s ease;
      position: relative;
    }
    
    .theme-toggle {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 2rem;
      padding: 0.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      z-index: 10;
    }
    
    .theme-toggle:hover {
      border-color: var(--accent-end);
      background: var(--bg-card-hover);
    }
    
    .theme-icon {
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }
    
    .theme-toggle:hover .theme-icon {
      transform: rotate(360deg);
    }
    
    .theme-text {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      font-weight: 500;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-primary);
      padding-right: 5rem;
    }
    
    h1 span {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      color: var(--text-tertiary);
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
      border-left: 3px solid var(--accent-end);
      padding-left: 0.8rem;
    }
    
    /* 缓存状态指示器 */
    .cache-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.5rem 1rem;
      background: var(--bg-upload);
      border-radius: 2rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }
    
    .cache-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    
    .cache-indicator.cached {
      background: var(--success-text);
      box-shadow: 0 0 8px var(--success-text);
    }
    
    .cache-indicator.loading {
      background: #ffa500;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .upload-area {
      background: var(--bg-upload);
      border: 2px dashed var(--border-upload);
      border-radius: 1.5rem;
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .upload-area:hover {
      border-color: var(--accent-end);
      background: rgba(118, 75, 162, 0.05);
      transform: translateY(-2px);
    }
    
    .upload-area.dragover {
      border-color: var(--accent-start);
      background: rgba(102, 126, 234, 0.1);
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
    }
    
    .upload-area.has-file {
      border-color: var(--accent-end);
      border-style: solid;
      background: rgba(118, 75, 162, 0.05);
    }
    
    .upload-area.error {
      border-color: var(--error-text);
      background: var(--error-bg);
      animation: shake 0.5s ease;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    input[type="file"] { display: none; }
    
    .file-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
    }
    
    .file-icon { 
      font-size: 3rem;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
      transition: transform 0.3s ease;
    }
    
    .upload-area:hover .file-icon {
      transform: scale(1.1);
    }
    
    .file-name {
      font-weight: 500;
      font-size: 1rem;
      word-break: break-all;
      color: var(--text-secondary);
      max-width: 100%;
    }
    
    .file-size {
      font-size: 0.8rem;
      color: var(--text-tertiary);
      margin-top: 0.2rem;
    }
    
    .file-hint { font-size: 0.8rem; color: var(--text-muted); }
    
    .format-selector {
      background: var(--bg-upload);
      border-radius: 1.2rem;
      padding: 1rem 1.2rem;
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      border: 1px solid var(--border-color);
    }
    
    .format-label {
      font-weight: 500;
      color: var(--text-tertiary);
      font-size: 0.9rem;
    }
    
    select {
      background: var(--bg-input);
      color: var(--text-primary);
      border: 1px solid var(--border-hover);
      padding: 0.6rem 2rem 0.6rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      cursor: pointer;
      appearance: none;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="gray"><path d="M7 10l5 5 5-5z"/></svg>');
      background-repeat: no-repeat;
      background-position: right 0.7rem center;
      background-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }
    
    select:hover {
      border-color: var(--accent-end);
    }
    
    .btn {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.9rem 2rem;
      border-radius: 2.5rem;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px var(--accent-shadow);
      letter-spacing: 0.5px;
    }
    
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px var(--accent-hover-shadow);
    }
    
    .btn:active:not(:disabled) {
      transform: translateY(0);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    
    .progress-container {
      margin: 1.2rem 0 0.5rem;
      background: var(--bg-progress);
      border-radius: 2rem;
      height: 0.5rem;
      width: 100%;
      overflow: hidden;
    }
    
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
      border-radius: 2rem;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(118, 75, 162, 0.5);
    }
    
    .status-text {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-top: 0.5rem;
      min-height: 1.2rem;
      transition: color 0.3s ease;
    }
    
    .download-link {
      display: none;
      margin-top: 1rem;
      background: var(--bg-upload);
      padding: 1rem;
      border-radius: 1.2rem;
      text-align: center;
      border: 1px solid var(--accent-end);
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .download-link a {
      color: var(--accent-start);
      font-weight: 600;
      text-decoration: none;
      word-break: break-all;
      transition: color 0.2s;
    }
    
    .download-link a:hover {
      color: var(--accent-end);
      text-decoration: underline;
    }
    
    .error-message {
      color: var(--error-text);
      background: var(--error-bg);
      padding: 0.8rem 1rem;
      border-radius: 1.2rem;
      margin-top: 1rem;
      font-size: 0.85rem;
      animation: fadeIn 0.3s ease;
      border: 1px solid var(--error-text);
    }
    
    .footer-note {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    
    .footer-note a {
      color: var(--accent-end);
      text-decoration: none;
    }
    
    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
        border-radius: 1.5rem;
      }
      
      h1 {
        font-size: 1.5rem;
        padding-right: 4rem;
      }
      
      .theme-toggle {
        top: 1rem;
        right: 1rem;
        padding: 0.4rem;
      }
      
      .upload-area {
        padding: 1.5rem 1rem;
      }
      
      .file-icon {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 主题切换按钮 -->
    <button class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="theme-icon">🌙</span>
      <span class="theme-text">暗色</span>
    </button>
    
    <h1>
      <span>🎬 视频音频提取器</span>
    </h1>
    <div class="subtitle">纯浏览器端处理 · 无需上传 · 隐私安全</div>

    <!-- 缓存状态 -->
    <div class="cache-status" id="cacheStatus">
      <span class="cache-indicator" id="cacheIndicator"></span>
      <span id="cacheText">检查缓存状态...</span>
      <button id="clearCacheBtn" style="display:none; margin-left:auto; background:none; border:1px solid var(--border-color); color:var(--text-tertiary); padding:0.2rem 0.8rem; border-radius:1rem; cursor:pointer; font-size:0.7rem;">清除缓存</button>
    </div>

    <!-- 上传区域 -->
    <div class="upload-area" id="uploadArea">
      <label class="file-label" for="videoInput">
        <span class="file-icon">🎥</span>
        <span id="fileNameDisplay" class="file-name">点击选择视频或拖拽到此处</span>
        <span id="fileSizeDisplay" class="file-size"></span>
        <span class="file-hint">MP4 · MOV · MKV · AVI · WebM · FLV · WMV</span>
      </label>
      <input type="file" id="videoInput" accept="video/*,.mkv,.avi,.mov,.webm,.flv,.wmv">
    </div>

    <!-- 格式选择 -->
    <div class="format-selector">
      <span class="format-label">🎵 输出格式</span>
      <select id="audioFormat">
        <option value="mp3" selected>MP3（推荐）</option>
        <option value="aac">AAC / M4A</option>
        <option value="wav">WAV 无损</option>
        <option value="ogg">OGG Vorbis</option>
        <option value="flac">FLAC 无损</option>
      </select>
    </div>

    <!-- 提取按钮 -->
    <button id="extractBtn" class="btn" disabled>
      🔊 提取音频
    </button>

    <!-- 进度条 -->
    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar" id="progressBar" style="width: 0%;"></div>
    </div>
    <div id="statusMessage" class="status-text">正在初始化引擎...</div>

    <!-- 下载区域 -->
    <div id="downloadArea" class="download-link">
      ✅ 提取完成：<a id="downloadLink" href="#" download="">下载音频</a>
    </div>
    
    <!-- 错误提示 -->
    <div id="errorMessage" class="error-message" style="display: none;"></div>
    
    <div class="footer-note">
      💡 基于 <a href="https://github.com/ffmpegwasm/ffmpeg.wasm" target="_blank">FFmpeg.wasm</a> · 
      <span id="cacheInfo">首次加载约31MB，之后从缓存读取</span>
    </div>
  </div>

  <!-- FFmpeg.wasm 0.9.8 -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.9.8/dist/ffmpeg.min.js"></script>
  <script>
    (function() {
      // ========== DOM 元素 ==========
      const themeToggle = document.getElementById('themeToggle');
      const uploadArea = document.getElementById('uploadArea');
      const videoInput = document.getElementById('videoInput');
      const fileNameDisplay = document.getElementById('fileNameDisplay');
      const fileSizeDisplay = document.getElementById('fileSizeDisplay');
      const extractBtn = document.getElementById('extractBtn');
      const audioFormatSelect = document.getElementById('audioFormat');
      const progressContainer = document.getElementById('progressContainer');
      const progressBar = document.getElementById('progressBar');
      const statusMessage = document.getElementById('statusMessage');
      const downloadArea = document.getElementById('downloadArea');
      const downloadLink = document.getElementById('downloadLink');
      const errorMessageDiv = document.getElementById('errorMessage');
      const cacheIndicator = document.getElementById('cacheIndicator');
      const cacheText = document.getElementById('cacheText');
      const clearCacheBtn = document.getElementById('clearCacheBtn');
      const cacheInfo = document.getElementById('cacheInfo');

      // ========== 缓存管理 ==========
      const CACHE_NAME = 'ffmpeg-cache-v2';
      const CORE_URL = 'https://unpkg.com/@ffmpeg/core@0.9.0/dist/ffmpeg-core.js';
      const FFMPEG_JS_URL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.9.8/dist/ffmpeg.min.js';
      
      // IndexedDB 数据库
      let db = null;
      
      function openDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open('FFmpegCache', 1);
          
          request.onupgradeneeded = (event) => {
            const db = event.target.result;
            if (!db.objectStoreNames.contains('files')) {
              db.createObjectStore('files');
            }
          };
          
          request.onsuccess = (event) => {
            db = event.target.result;
            resolve(db);
          };
          
          request.onerror = (event) => {
            console.error('IndexedDB 打开失败:', event.target.error);
            reject(event.target.error);
          };
        });
      }
      
      async function getCachedFile(key) {
        if (!db) return null;
        
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['files'], 'readonly');
          const store = transaction.objectStore('files');
          const request = store.get(key);
          
          request.onsuccess = () => {
            resolve(request.result);
          };
          
          request.onerror = () => {
            reject(request.error);
          };
        });
      }
      
      async function setCachedFile(key, data) {
        if (!db) return;
        
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['files'], 'readwrite');
          const store = transaction.objectStore('files');
          const request = store.put(data, key);
          
          request.onsuccess = () => {
            resolve();
          };
          
          request.onerror = () => {
            reject(request.error);
          };
        });
      }
      
      async function clearCache() {
        if (!db) return;
        
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(['files'], 'readwrite');
          const store = transaction.objectStore('files');
          const request = store.clear();
          
          request.onsuccess = () => {
            console.log('缓存已清除');
            updateCacheStatus(false);
            clearCacheBtn.style.display = 'none';
            cacheInfo.textContent = '首次加载约31MB，之后从缓存读取';
            resolve();
          };
          
          request.onerror = () => {
            reject(request.error);
          };
        });
      }
      
      async function updateCacheStatus(isCached) {
        if (isCached) {
          cacheIndicator.className = 'cache-indicator cached';
          cacheText.textContent = '✅ 引擎已缓存，加载中...';
          clearCacheBtn.style.display = 'inline-block';
          cacheInfo.textContent = '从缓存加载，无需重新下载';
        } else {
          cacheIndicator.className = 'cache-indicator loading';
          cacheText.textContent = '⏳ 正在下载引擎文件...';
          clearCacheBtn.style.display = 'none';
          cacheInfo.textContent = '首次加载约31MB，之后从缓存读取';
        }
      }
      
      clearCacheBtn.addEventListener('click', async () => {
        if (confirm('确定要清除缓存的 FFmpeg 引擎文件吗？下次加载将重新下载约31MB。')) {
          await clearCache();
          setStatus('缓存已清除，刷新页面将重新下载引擎');
        }
      });

      // ========== 状态管理 ==========
      let selectedFile = null;
      let ffmpeg = null;
      let ffmpegReady = false;
      let isProcessing = false;
      let outputBaseName = 'audio';
      
      const SUPPORTED_TYPES = {
        extensions: /\.(mp4|mkv|avi|mov|webm|flv|wmv|m4v|3gp|ogv|ts|mts|m2ts|vob|mpg|mpeg)$/i,
        mimeTypes: ['video/']
      };
      
      const MAX_FILE_SIZE = 2 * 1024 * 1024 * 1024;

      // ========== 主题管理 ==========
      function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeButton(savedTheme);
      }
      
      function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeButton(newTheme);
      }
      
      function updateThemeButton(theme) {
        const icon = themeToggle.querySelector('.theme-icon');
        const text = themeToggle.querySelector('.theme-text');
        if (theme === 'light') {
          icon.textContent = '☀️';
          text.textContent = '亮色';
        } else {
          icon.textContent = '🌙';
          text.textContent = '暗色';
        }
      }
      
      themeToggle.addEventListener('click', toggleTheme);
      initTheme();

      // ========== UI 工具函数 ==========
      function setStatus(text, isError = false) {
        statusMessage.textContent = text;
        statusMessage.style.color = isError ? 'var(--error-text)' : 'var(--text-tertiary)';
      }

      function showError(text) {
        errorMessageDiv.textContent = '⚠️ ' + text;
        errorMessageDiv.style.display = 'block';
        downloadArea.style.display = 'none';
        uploadArea.classList.add('error');
        setTimeout(() => uploadArea.classList.remove('error'), 500);
      }

      function hideError() {
        errorMessageDiv.style.display = 'none';
      }
      
      function formatFileSize(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }

      // ========== 下载并缓存文件 ==========
      async function downloadAndCache(url, cacheKey) {
        // 检查缓存
        const cached = await getCachedFile(cacheKey);
        if (cached) {
          console.log(`✅ 从缓存加载: ${cacheKey}`);
          return cached.data;
        }
        
        // 下载文件
        console.log(`📥 下载文件: ${url}`);
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`下载失败: ${response.status} ${response.statusText}`);
        }
        
        // 获取总大小
        const contentLength = response.headers.get('content-length');
        const total = contentLength ? parseInt(contentLength) : 0;
        
        // 如果支持流式读取，显示进度
        let data;
        if (response.body && total > 0) {
          const reader = response.body.getReader();
          const chunks = [];
          let received = 0;
          
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            chunks.push(value);
            received += value.length;
            
            // 更新下载进度
            const percent = Math.round((received / total) * 100);
            progressBar.style.width = `${Math.min(percent, 95)}%`;
            setStatus(`📥 下载引擎文件... ${percent}% (${formatFileSize(received)}/${formatFileSize(total)})`);
          }
          
          // 合并数据
          const blob = new Blob(chunks);
          data = new Uint8Array(await blob.arrayBuffer());
        } else {
          // 不支持流式，直接获取
          data = new Uint8Array(await response.arrayBuffer());
        }
        
        // 缓存数据
        await setCachedFile(cacheKey, {
          data: data,
          url: url,
          timestamp: Date.now(),
          size: data.length
        });
        
        console.log(`✅ 已缓存: ${cacheKey} (${formatFileSize(data.length)})`);
        return data;
      }

      // ========== FFmpeg 初始化（带缓存）==========
      async function initFFmpeg() {
        if (ffmpegReady) return;
        
        try {
          // 打开数据库
          await openDatabase();
          
          // 检查缓存状态
          const coreCached = await getCachedFile(CORE_URL);
          const ffmpegCached = await getCachedFile(FFMPEG_JS_URL);
          
          if (coreCached) {
            console.log(`💾 发现缓存: ffmpeg-core.js (${formatFileSize(coreCached.size)})`);
          }
          
          await updateCacheStatus(!!coreCached);
          
          setStatus('⏳ 正在初始化 FFmpeg 引擎...');
          progressContainer.style.display = 'block';
          progressBar.style.width = coreCached ? '30%' : '5%';
          
          const { createFFmpeg } = FFmpeg;
          
          ffmpeg = createFFmpeg({
            log: false,
            // 使用自定义 corePath，通过 Blob URL 加载缓存的文件
            corePath: CORE_URL,
          });
          
          // 拦截 core 文件的加载，使用缓存
          const originalFetch = window.fetch;
          window.fetch = async function(input, init) {
            const url = typeof input === 'string' ? input : input.url;
            
            // 拦截 ffmpeg-core.js 的请求
            if (url.includes('ffmpeg-core.js') || url.includes('ffmpeg-core')) {
              try {
                const cachedData = await downloadAndCache(CORE_URL, CORE_URL);
                // 创建 Blob URL
                const blob = new Blob([cachedData], { type: 'application/javascript' });
                const blobUrl = URL.createObjectURL(blob);
                
                // 恢复原始 fetch
                window.fetch = originalFetch;
                
                return {
                  ok: true,
                  status: 200,
                  url: blobUrl,
                  text: async () => {
                    const decoder = new TextDecoder();
                    return decoder.decode(cachedData);
                  },
                  arrayBuffer: async () => cachedData.buffer,
                  blob: async () => blob,
                };
              } catch (error) {
                console.error('缓存加载失败，回退到网络:', error);
                // 恢复原始 fetch 并重试
                window.fetch = originalFetch;
                return originalFetch(input, init);
              }
            }
            
            return originalFetch(input, init);
          };
          
          progressBar.style.width = coreCached ? '50%' : '20%';
          
          if (coreCached) {
            setStatus('⚡ 从缓存加载引擎...');
          } else {
            setStatus('📥 正在下载引擎文件（约31MB）...');
          }
          
          // 加载 FFmpeg
          const startTime = Date.now();
          await ffmpeg.load();
          const loadTime = ((Date.now() - startTime) / 1000).toFixed(1);
          
          // 恢复原始 fetch
          window.fetch = originalFetch;
          
          ffmpegReady = true;
          progressBar.style.width = '100%';
          
          if (coreCached) {
            setStatus(`✅ 引擎就绪（缓存加载，耗时 ${loadTime}秒）`);
          } else {
            setStatus(`✅ 引擎就绪（首次下载，耗时 ${loadTime}秒）`);
          }
          
          await updateCacheStatus(true);
          
          setTimeout(() => {
            progressContainer.style.display = 'none';
          }, 1500);
          
          if (selectedFile) {
            extractBtn.disabled = false;
          }
          
        } catch (error) {
          console.error('FFmpeg 加载失败:', error);
          setStatus('❌ 引擎加载失败，请刷新页面', true);
          progressContainer.style.display = 'none';
          showError('引擎加载失败: ' + error.message + '。请检查网络连接后刷新页面。');
          
          // 恢复原始 fetch
          window.fetch = originalFetch;
        }
      }

      // 页面加载时初始化
      initFFmpeg();

      // ========== 文件验证和上传处理 ==========
      function validateFile(file) {
        if (!file) {
          return { valid: false, error: '未选择文件' };
        }
        
        if (file.size === 0) {
          return { valid: false, error: '文件大小为0，可能文件损坏' };
        }
        
        if (file.size > MAX_FILE_SIZE) {
          return { valid: false, error: `文件过大（最大支持2GB），当前文件: ${formatFileSize(file.size)}` };
        }
        
        const isMimeValid = SUPPORTED_TYPES.mimeTypes.some(type => file.type.startsWith(type));
        const isExtensionValid = SUPPORTED_TYPES.extensions.test(file.name);
        
        if (!isMimeValid && !isExtensionValid) {
          return { 
            valid: false, 
            error: `不支持的文件类型: ${file.type || '未知'}。支持: MP4, MKV, AVI, MOV, WebM, FLV, WMV 等` 
          };
        }
        
        return { valid: true };
      }
      
      function handleFile(file) {
        hideError();
        downloadArea.style.display = 'none';
        uploadArea.classList.remove('has-file', 'error');
        
        const validation = validateFile(file);
        
        if (!validation.valid) {
          showError(validation.error);
          selectedFile = null;
          extractBtn.disabled = true;
          fileNameDisplay.textContent = '点击选择视频或拖拽到此处';
          fileSizeDisplay.textContent = '';
          return;
        }
        
        selectedFile = file;
        
        fileNameDisplay.textContent = '📁 ' + file.name;
        fileSizeDisplay.textContent = '文件大小: ' + formatFileSize(file.size);
        uploadArea.classList.add('has-file');
        
        const dotIndex = file.name.lastIndexOf('.');
        outputBaseName = dotIndex > 0 
          ? file.name.substring(0, dotIndex).replace(/[^a-zA-Z0-9\u4e00-\u9fff\s\-_]/g, '').trim() 
          : 'audio';
        if (!outputBaseName) outputBaseName = 'audio';
        
        if (file.size > 500 * 1024 * 1024) {
          setStatus('⚠️ 文件较大（>500MB），处理可能需要较长时间');
        } else if (file.size > 100 * 1024 * 1024) {
          setStatus('ℹ️ 文件较大，处理可能需要一些时间');
        } else if (ffmpegReady) {
          setStatus('✅ 文件已选择，点击按钮开始提取');
        }
        
        extractBtn.disabled = !ffmpegReady;
        
        if (!ffmpegReady) {
          setStatus('⏳ 等待引擎加载完成...');
        }
      }

      // ========== 事件监听 ==========
      videoInput.addEventListener('change', (e) => {
        handleFile(e.target.files[0]);
      });

      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.add('dragover');
      });

      uploadArea.addEventListener('dragenter', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.add('dragover');
      });

      uploadArea.addEventListener('dragleave', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.remove('dragover');
      });

      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadArea.classList.remove('dragover');
        
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          const dt = new DataTransfer();
          dt.items.add(files[0]);
          videoInput.files = dt.files;
          handleFile(files[0]);
        }
      });

      uploadArea.addEventListener('click', (e) => {
        if (e.target === uploadArea || e.target.closest('.file-label')) {
          videoInput.click();
        }
      });

      // ========== 音频提取 ==========
      extractBtn.addEventListener('click', async () => {
        if (!selectedFile) {
          showError('请先选择视频文件');
          return;
        }
        
        if (!ffmpegReady || !ffmpeg) {
          showError('FFmpeg 引擎尚未就绪，请等待加载完成');
          return;
        }
        
        if (isProcessing) {
          showError('正在处理中，请等待当前任务完成');
          return;
        }
        
        const validation = validateFile(selectedFile);
        if (!validation.valid) {
          showError(validation.error);
          return;
        }

        isProcessing = true;
        hideError();
        downloadArea.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        extractBtn.disabled = true;
        
        const format = audioFormatSelect.value;
        
        try {
          setStatus('📥 正在读取视频文件...');
          
          const { fetchFile } = FFmpeg;
          const fileData = await fetchFile(selectedFile);
          ffmpeg.FS('writeFile', 'input.mp4', fileData);
          
          progressBar.style.width = '20%';
          
          const formatConfig = {
            mp3: { ext: 'mp3', args: ['-acodec', 'libmp3lame', '-q:a', '2'] },
            aac: { ext: 'm4a', args: ['-acodec', 'aac', '-b:a', '192k'] },
            wav: { ext: 'wav', args: ['-acodec', 'pcm_s16le'] },
            ogg: { ext: 'ogg', args: ['-acodec', 'libvorbis', '-q:a', '3'] },
            flac: { ext: 'flac', args: ['-acodec', 'flac', '-compression_level', '8'] }
          };
          
          const config = formatConfig[format] || formatConfig.mp3;
          const outputFile = `output.${config.ext}`;
          
          setStatus('🎬 正在提取音频...');
          progressBar.style.width = '40%';
          
          const startTime = Date.now();
          await ffmpeg.run('-i', 'input.mp4', '-vn', ...config.args, outputFile);
          const duration = ((Date.now() - startTime) / 1000).toFixed(1);
          
          progressBar.style.width = '80%';
          setStatus(`📦 准备下载... (耗时 ${duration}秒)`);
          
          const data = ffmpeg.FS('readFile', outputFile);
          
          if (!data || data.length === 0) {
            throw new Error('提取的音频文件为空');
          }
          
          const mimeTypes = {
            mp3: 'audio/mpeg',
            m4a: 'audio/mp4',
            wav: 'audio/wav',
            ogg: 'audio/ogg',
            flac: 'audio/flac'
          };
          
          const blob = new Blob([data.buffer], { 
            type: mimeTypes[config.ext] || 'application/octet-stream' 
          });
          
          if (downloadLink.href?.startsWith('blob:')) {
            URL.revokeObjectURL(downloadLink.href);
          }
          
          const outputFileName = `${outputBaseName}.${config.ext}`;
          const url = URL.createObjectURL(blob);
          
          downloadLink.href = url;
          downloadLink.download = outputFileName;
          downloadLink.textContent = `📥 ${outputFileName} (${formatFileSize(blob.size)})`;
          downloadArea.style.display = 'block';
          
          setStatus(`✅ 提取完成！音频大小: ${formatFileSize(blob.size)}`);
          progressBar.style.width = '100%';
          
          try {
            ffmpeg.FS('unlink', 'input.mp4');
            ffmpeg.FS('unlink', outputFile);
          } catch(e) {}
          
        } catch (err) {
          console.error('提取失败:', err);
          showError('提取失败: ' + (err.message || '未知错误'));
          setStatus('❌ 处理出错，请重试', true);
          progressBar.style.width = '0%';
          
          try {
            ffmpeg.FS('unlink', 'input.mp4');
          } catch(e) {}
          
        } finally {
          isProcessing = false;
          progressContainer.style.display = 'none';
          extractBtn.disabled = !selectedFile || !ffmpegReady;
        }
      });

      // ========== 清理资源 ==========
      window.addEventListener('beforeunload', () => {
        if (downloadLink.href?.startsWith('blob:')) {
          URL.revokeObjectURL(downloadLink.href);
        }
      });
      
      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
          e.preventDefault();
          videoInput.click();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 't') {
          e.preventDefault();
          toggleTheme();
        }
      });
      
      console.log('🚀 视频音频提取器已就绪（支持缓存）');
      console.log('⌨️ 快捷键: Ctrl+O 打开文件 | Ctrl+T 切换主题');
      console.log('💾 首次下载后，FFmpeg 引擎将缓存到浏览器');

    })();
  </script>
</body>
</html>
