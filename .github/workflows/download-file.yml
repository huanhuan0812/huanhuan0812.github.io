name: Download File

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: '要下载的文件URL'
        required: true
        type: string
      output_filename:
        description: '输出文件名（可选，留空则自动使用URL中的文件名）'
        required: false
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download file
        run: |
          if [ -z "${{ github.event.inputs.output_filename }}" ]; then
            # 自动从URL提取文件名
            FILENAME=$(basename "${{ github.event.inputs.download_url }}")
          else
            FILENAME="${{ github.event.inputs.output_filename }}"
          fi
          
          echo "下载文件: $FILENAME"
          curl -L -o "$FILENAME" "${{ github.event.inputs.download_url }}"
          
          # 输出文件信息
          echo "FILE_NAME=$FILENAME" >> $GITHUB_ENV
          echo "FILE_SIZE=$(du -h "$FILENAME" | cut -f1)" >> $GITHUB_ENV
          echo "FILE_PATH=$(pwd)/$FILENAME" >> $GITHUB_ENV
      
      - name: 显示文件信息
        run: |
          echo "📁 文件名: ${{ env.FILE_NAME }}"
          echo "📊 文件大小: ${{ env.FILE_SIZE }}"
          echo "📍 文件路径: ${{ env.FILE_PATH }}"
      
      - name: 上传文件作为Artifact
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: ${{ env.FILE_NAME }}